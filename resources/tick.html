<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时序信号 · 单条发送</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
        .page { max-width: 560px; margin: 0 auto; padding: 32px 24px; }
        h1 { font-size: 28px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.5px; }
        .sub { font-size: 14px; color: #86868b; margin: 0 0 24px; line-height: 1.5; }
        .sub a { color: #0071e3; text-decoration: none; }
        .sub a:hover { text-decoration: underline; }
        .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .btn { padding: 10px 20px; font-size: 14px; font-weight: 500; border: none; border-radius: 10px; cursor: pointer; background: #0071e3; color: #fff; transition: background 0.2s; }
        .btn:hover { background: #0077ed; }
        #msg { font-size: 13px; color: #86868b; margin-top: 16px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="page">
        <h1>时序信号客户端</h1>
        <p class="sub">发送单条时序数据（value=1.0）。可打开 <a href="/state" target="_blank">/state</a> 查看状态，或使用 <a href="/signal.html">生成信号并并发发送</a>。</p>
        <div class="card">
            <button id="send" class="btn">发送 /tick?value=1.0</button>
            <p id="msg"></p>
        </div>
    </div>
    <script>
        document.getElementById('send').onclick = function() {
            var msg = document.getElementById('msg');
            msg.textContent = '发送中...';
            fetch(window.location.origin + '/tick?value=1.0')
                .then(function(r) { return r.text(); })
                .then(function(t) { msg.textContent = '已发送，响应: ' + t.trim(); })
                .catch(function(e) { msg.textContent = '错误: ' + e; });
        };
    </script>
</body>
</html>
